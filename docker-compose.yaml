version: '3.8'

services:
  livekit:
    image: 'livekit/livekit-server:v1.10.1'
    container_name: livekit_server
    restart: always
    network_mode: "bridge"  # Cambiar de 'host' a 'bridge' para tener control de la red

    environment:
      LIVEKIT_API_KEY: '${LIVEKIT_API_KEY}'
      LIVEKIT_API_SECRET: '${LIVEKIT_API_SECRET}'
      LIVEKIT_NODE_IP: '86.48.22.209'  # Usar IPv4 explícitamente
      LIVEKIT_TURN_SECRET: '${LIVEKIT_TURN_SECRET}'
      LIVEKIT_LOGGING_LEVEL: 'info'

    volumes:
      - '/opt/livekit/certs:/certs:ro'

    command:
      - '--node-ip'
      - '86.48.22.209'  # Usar IPv4 explícitamente
      - '--bind'
      - '86.48.22.209'  # IPv4 explícita
      - '--bind'
      - '127.0.0.1'  # Dirección local IPv4
      - '--config-body'
      - |
        port: 7880
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 60000  # Rango completo para miles de usuarios
          use_external_ip: true
        
        turn:
          enabled: true
          domain: turn.appideax.com
          udp_port: 3478
          tls_port: 5349
          cert_file: /certs/turn/fullchain.pem
          key_file: /certs/turn/privkey.pem
          relay_range_start: 50000
          relay_range_end: 60000
        
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

networks:
  default:
    driver: bridge  # Asegura que usamos solo IPv4 dentro de la red bridge
    ipam:
      driver: default
      config:
        - subnet: "172.18.0.0/16"  # Asegurarse de que esta red usa solo IPv4

